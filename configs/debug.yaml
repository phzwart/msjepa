image_size: 128
in_channels: 3
patch_size: 8
stride: 8
embed_dim: 64
depths: [1, 1, 2, 1]
num_heads: [2, 4, 8, 16]
window_size: 4
mlp_ratio: 4.0
dropout: 0.0
drop_path: 0.05
decoder_channels: [256, 192, 128, 96]
dense_feature_dim: 64
predictor_hidden_dim: 128
predictor_depth: 2
use_absolute_positional_embedding: false
use_relative_position_bias: true
mask_ratio: 0.5
mask_block_size: [2, 2]
mask_seed: 7
ema_decay: 0.99
prediction_loss_type: cosine
feature_normalization: l2
optimizer: adamw
learning_rate: 0.0003
weight_decay: 0.01
batch_size: 2
num_epochs: 5
scheduler: cosine
warmup: 1
checkpoint_dir: checkpoints/debug
use_amp: false
sigreg_weight: 0.05
sigreg_target: both
flat_channel_threshold: 0.0005
feature_stat_logging_frequency: 1
